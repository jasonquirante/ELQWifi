[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino, espidf
monitor_speed = 115200
upload_speed = 921600
board_build.sdkconfig_defaults = sdkconfig.defaults

; Use the ESP32 Arduino framework alongside ESP-IDF networking primitives for PPP/LWIP support.
; Keep the firmware minimal and compatible with SIM7600G + microSD module.
