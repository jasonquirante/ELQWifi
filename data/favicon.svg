<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ELQ AeroMesh favicon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5b63"/>
      <stop offset="100%" stop-color="#22444b"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#32d0e8"/>
      <stop offset="100%" stop-color="#2aa8c0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9d3e"/>
      <stop offset="100%" stop-color="#e97c2d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="200" r="138" fill="none" stroke="#dfe8f2" stroke-width="18" opacity="0.9"/>
  <circle cx="256" cy="200" r="118" fill="none" stroke="#9ab2bc" stroke-width="4" opacity="0.32"/>
  <circle cx="256" cy="200" r="92" fill="none" stroke="#32d0e8" stroke-width="2" opacity="0.35" stroke-dasharray="7 12"/>

  <g opacity="0.3" stroke="#36c8de" stroke-width="2" fill="none">
    <path d="M170 170l20-12 20 12-20 12z"/>
    <path d="M218 146l20-12 20 12-20 12z"/>
    <path d="M286 150l20-12 20 12-20 12z"/>
    <path d="M324 182l20-12 20 12-20 12z"/>
    <path d="M190 218l20-12 20 12-20 12z"/>
    <path d="M246 236l20-12 20 12-20 12z"/>
    <path d="M300 228l20-12 20 12-20 12z"/>
  </g>

  <g filter="url(#glow)">
    <line x1="112" y1="210" x2="400" y2="210" stroke="url(#wing)" stroke-width="20" stroke-linecap="round"/>
    <line x1="256" y1="120" x2="256" y2="300" stroke="url(#wing)" stroke-width="18" stroke-linecap="round" transform="rotate(28 256 210)"/>
    <line x1="256" y1="120" x2="256" y2="300" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" transform="rotate(-28 256 210)"/>

    <circle cx="256" cy="210" r="30" fill="#20464d" stroke="#36c8de" stroke-width="8"/>
    <circle cx="256" cy="210" r="14" fill="#36c8de" opacity="0.85"/>

    <circle cx="136" cy="210" r="11" fill="#36c8de"/>
    <circle cx="376" cy="210" r="11" fill="#ff9d3e"/>
    <circle cx="186" cy="134" r="11" fill="#32d0e8"/>
    <circle cx="326" cy="134" r="11" fill="#f28f35"/>
    <circle cx="186" cy="286" r="11" fill="#ff9d3e"/>
    <circle cx="326" cy="286" r="11" fill="#36c8de"/>

    <text x="256" y="193" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#dfe8f2">E</text>
    <text x="256" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#ff9d3e">LQ</text>
  </g>

